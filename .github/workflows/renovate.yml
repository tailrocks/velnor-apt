name: Renovate

on:
  merge_group:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      lanes:
        description: velnor (default) | github | both
        type: choice
        default: velnor
        options: [velnor, github, both]

permissions:
  contents: read

concurrency:
  group: renovate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  renovate:
    name: Renovate (${{ matrix.config.lane }})
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Cache Renovate data
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .renovate/cache
          key: renovate-${{ matrix.config.lane }}-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            renovate-${{ matrix.config.lane }}-${{ runner.os }}-

      - name: Prepare shared Renovate data
        run: |
          install -d -m 0777 .renovate .renovate/cache .renovate/repos
          chmod -R a+rwX .renovate

      - name: Self-hosted Renovate
        if: matrix.config.writer
        # The PAT named "tailrocks-renovate" (fine-grained, not classic) must be
        # stored in the repo secret GH_RENOVATE_TOKEN.
        uses: renovatebot/github-action@3064367f740a1a91cca218698a63902689cce200 # v46.1.20
        with:
          token: ${{ secrets.GH_RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: false
          RENOVATE_REPOSITORY_CACHE: enabled
          RENOVATE_BASE_DIR: /github/workspace/.renovate
          RENOVATE_GIT_AUTHOR: "Renovate Bot <renovate@whitesourcesoftware.com>"
          LOG_LEVEL: debug

      - name: Explain read-only comparison lane
        if: ${{ !matrix.config.writer }}
        run: echo 'Read-only comparison lane; Renovate mutation skipped.'

  renovate-required:
    needs: [renovate]
    if: always()
    name: Renovate required (${{ matrix.config.lane }})
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    steps:
      - name: Fail on any failed or cancelled need
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS_JSON" | jq -e 'to_entries | map(.value.result) | any(. == "failure" or . == "cancelled") | not' >/dev/null \
            || { echo "A required job failed or was cancelled." >&2; exit 1; }
