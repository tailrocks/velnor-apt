name: Publish apt repo

# Adds a velnor-runner .deb to the signed apt pool and publishes the tree to
# GitHub Pages via GitHub Actions. Only current versions are published
# in the index (old .debs remain in historical Releases but are not
# part of the current apt repo). Trigger after a velnor-runner release.
on:
  workflow_dispatch:
    inputs:
      lanes:
        description: velnor (default) | github | both
        type: choice
        default: velnor
        options: [velnor, github, both]
      version:
        description: "velnor-runner release tag to publish (e.g. v0.1.0). Empty = latest."
        type: string
        default: ""
  # Optional: let the velnor repo's release workflow trigger this via
  #   gh api repos/tailrocks/velnor-apt/dispatches -f event_type=publish-deb
  repository_dispatch:
    types: [publish-deb]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build apt repository (${{ matrix.config.lane }})
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    steps:
      - name: Checkout repo config (conf/distributions)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system packages through mise
        # reprepro has no maintained user-space binary distribution; mise's
        # exact apt bootstrap is the audited privilege boundary.
        run: mise bootstrap packages apply --yes

      - name: Import GPG signing key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [ -z "${APT_GPG_PRIVATE_KEY:-}" ]; then
            echo "::error::APT_GPG_PRIVATE_KEY secret is not set — see README one-time setup."
            exit 1
          fi
          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          # Export the public key into the tree so users can fetch velnor.gpg.
          KEYID="$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/{print $5; exit}')"
          echo "GPG_KEYID=$KEYID" >> "$GITHUB_ENV"
          gpg --armor --export "$KEYID" > velnor.gpg
          # Prime gpg for headless signing (loopback + supplied passphrase).
          # Prevents "Inappropriate ioctl for device / Pinentry" errors from gpgme/reprepro in CI.
          echo "$APT_GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
            --sign --local-user "$KEYID" --output /dev/null --detach-sign <(echo "prime signing for reprepro") 2>/dev/null || true

      - name: Download .debs from this repo's releases (source of truth for published versions)
        # .debs are attached to this repo's Releases (cross-uploaded from the velnor source release).
        # Download only for this version (forget old packages per user request).
        # Build fresh reprepro tree with only current .debs. No state branch needed.
        # Best practice: Releases hold the .debs (persistent), Pages (via Actions) holds the current index only.
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.inputs.version }}${{ github.event.client_payload.version }}
        run: |
          set -euo pipefail
          mkdir -p incoming
          if [ -n "${VERSION:-}" ]; then
            echo "Downloading debs for $VERSION"
            gh release download "$VERSION" --pattern '*.deb' --dir incoming || echo "No debs for $VERSION"
          else
            TAG="$(gh release view --json tagName -q .tagName)"
            echo "Downloading debs for latest $TAG"
            gh release download "$TAG" --pattern '*.deb' --dir incoming || echo "No debs"
          fi
          ls -la incoming

      - name: Build fresh apt repository with reprepro (current versions only)
        env:
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          # Fresh each time: only the .debs being published now. Old versions are forgotten from the index (remain in old Releases for manual dpkg -i if ever needed).
          rm -rf public
          mkdir -p public/conf
          cat > public/conf/distributions << 'DIST'
          Origin: Velnor
          Label: Velnor
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          Description: apt repository for the Velnor self-hosted GitHub Actions runner
          SignWith: 
          DIST
          sed -i "s/^SignWith:.*/SignWith: ${GPG_KEYID}/" public/conf/distributions
          cp velnor.gpg public/velnor.gpg

          for deb in incoming/*.deb; do
            if [ -f "$deb" ]; then
              reprepro -b public --gnupghome "$HOME/.gnupg" includedeb stable "$deb"
            fi
          done
          find public/dists public/pool -print | sort | sed -n '1,50p'

      - name: Setup Pages
        if: matrix.config.writer
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload artifact
        if: matrix.config.writer
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ./public

  deploy:
    name: Deploy apt repository (${{ matrix.config.lane }})
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        if: matrix.config.writer
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

      - name: Explain read-only comparison lane
        if: ${{ !matrix.config.writer }}
        run: echo 'Read-only comparison lane; Pages deployment skipped.'

  publish-required:
    needs: [build, deploy]
    if: always()
    name: Publish required (${{ matrix.config.lane }})
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    steps:
      - name: Fail on any failed or cancelled need
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS_JSON" | jq -e 'to_entries | map(.value.result) | any(. == "failure" or . == "cancelled") | not' >/dev/null \
            || { echo "A required job failed or was cancelled." >&2; exit 1; }
